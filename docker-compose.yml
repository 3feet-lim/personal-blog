services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-personal-blog}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/app.db}
      DEFAULT_AUTH_PROVIDER: ${DEFAULT_AUTH_PROVIDER:-google}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/callback/google}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-personal-blog}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_SECURE: ${STORAGE_SECURE:-false}
    volumes:
      - backend_data:/app/data
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_blog}
      POSTGRES_USER: ${POSTGRES_USER:-personal_blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personal_blog}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  backend_data:
  minio_data:
  postgres_data:
